name: Release APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Test and assemble debug APK
        run: ./gradlew test assembleDebug

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk release/Micreta-debug.apk
          sha256sum release/Micreta-debug.apk > release/Micreta-debug.apk.sha256

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            release/Micreta-debug.apk \
            release/Micreta-debug.apk.sha256 \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Micreta ${GITHUB_REF_NAME}" \
            --notes "APK debug de Micreta generada automáticamente desde ${GITHUB_SHA}. Para instalarla en Android, descarga Micreta-debug.apk y permite instalar apps desconocidas para tu navegador o gestor de archivos."
